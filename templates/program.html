<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Page</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.1.3/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            background-color: rgba(0, 0, 0, 0);
            position: absolute;
        }

        .module {
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
            width: 1920px;
            height: 1080px;
        }
    </style>
</head>
<body>
<div id="modules-container">
    {% for module in modules %}
        <iframe src="/modules/{{ module }}" class="module" scrolling="no" frameborder="no"></iframe>
    {% endfor %}
</div>
</body>
</html>
