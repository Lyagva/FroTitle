<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Safe Zones</title>
    <style>
        body {
            background: rgba(0, 0, 0, 0);
            width: 1920px;
            height: 1080px;
            margin: 0;
            position: relative;
        }

        .zone {
            position: absolute;
            background: rgba(0, 0, 0, 0);
            box-sizing: border-box;
        }

        .safe_action {
            border: 1px dashed green;
            top: 3.5%;
            left: 3.5%;
            right: 3.5%;
            bottom: 3.5%;
        }

        .safe_graphics {
            border: 1px dotted red;
            top: 5%;
            left: 5%;
            right: 5%;
            bottom: 5%;
        }

        .center_line {
            position: absolute;
            background: white;
            z-index: 1;
        }

        .vertical_line {
            left: 50%;
            top: 0;
            width: 1px;
            height: 100%;
            margin-left: -1px;
        }

        .horizontal_line {
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            margin-top: -1px;
        }

        /* Grid of thirds */
        .vertical_third_line {
            position: absolute;
            background: #888;
            width: 1px;
            height: 100%;
            z-index: 1;
        }

        .horizontal_third_line {
            position: absolute;
            background: #888;
            height: 1px;
            width: 100%;
            z-index: 1;
        }

        /* First vertical third line */
        .third_line_1_vertical {
            left: 33.33%;
        }

        /* Second vertical third line */
        .third_line_2_vertical {
            left: 66.66%;
        }

        /* First horizontal third line */
        .third_line_1_horizontal {
            top: 33.33%;
        }

        /* Second horizontal third line */
        .third_line_2_horizontal {
            top: 66.66%;
        }
    </style>
</head>
<body>
<div class="safe_graphics zone"></div>
<div class="safe_action zone"></div>
<div class="center_line vertical_line"></div>
<div class="center_line horizontal_line"></div>

<!-- Thirds Grid Lines -->
<div class="third_line_1_vertical vertical_third_line"></div>
<div class="third_line_2_vertical vertical_third_line"></div>
<div class="third_line_1_horizontal horizontal_third_line"></div>
<div class="third_line_2_horizontal horizontal_third_line"></div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
<script src="/module_loader"></script>

<script>
    function anim_toggleSafe() {
        if (document.querySelector('.safe_graphics').style.visibility === "hidden") {
            document.querySelector('.safe_graphics').style.visibility = 'visible';
            document.querySelector('.safe_action').style.visibility = 'visible';
            return;
        }
        document.querySelector('.safe_graphics').style.visibility = 'hidden';
        document.querySelector('.safe_action').style.visibility = 'hidden';
    }

    function anim_toggleCenter() {
        if (document.querySelector('.vertical_line').style.visibility === "hidden") {
            document.querySelector('.vertical_line').style.visibility = 'visible';
            document.querySelector('.horizontal_line').style.visibility = 'visible';
            return;
        }
        document.querySelector('.vertical_line').style.visibility = 'hidden';
        document.querySelector('.horizontal_line').style.visibility = 'hidden';
    }
    
    let thirds_visibility = "visible";
    function anim_toggleThirds() {
        if (thirds_visibility === "hidden") {
            thirds_visibility = "visible";
        } else {
            thirds_visibility = "hidden";
        }
        document.querySelector(".third_line_1_vertical").style.visibility = thirds_visibility;
        document.querySelector(".third_line_2_vertical").style.visibility = thirds_visibility;
        document.querySelector(".third_line_1_horizontal").style.visibility = thirds_visibility;
        document.querySelector(".third_line_2_horizontal").style.visibility = thirds_visibility;
    }

    function property_thickness(value) {
        document.querySelector(".safe_action").style.borderWidth = value.toString() + "px";
        document.querySelector(".safe_graphics").style.borderWidth = value.toString() + "px";
        document.querySelector(".vertical_line").style.width = value.toString() + "px";
        document.querySelector(".horizontal_line").style.height = value.toString() + "px";
        document.querySelectorAll(".vertical_third_line").forEach(line => {
            line.style.width = value.toString() + "px";
        });
        document.querySelectorAll(".horizontal_third_line").forEach(line => {
            line.style.height = value.toString() + "px";
        });
    }

    // New function to change the color of the center cross lines
    function property_centerColor(value) {
        document.querySelector(".vertical_line").style.backgroundColor = value;
        document.querySelector(".horizontal_line").style.backgroundColor = value;
    }
    function property_thirdsColor(value) {
        document.querySelector(".third_line_1_vertical").style.backgroundColor = value;
        document.querySelector(".third_line_2_vertical").style.backgroundColor = value;
        document.querySelector(".third_line_1_horizontal").style.backgroundColor = value;
        document.querySelector(".third_line_2_horizontal").style.backgroundColor = value;
    }

    setModuleID("safe_area");
    attach_animation_function("toggleSafe", anim_toggleSafe);
    attach_animation_function("toggleCenter", anim_toggleCenter);
    attach_animation_function("toggleThirds", anim_toggleThirds);
    attach_property_function("thickness", property_thickness);
    attach_property_function("centerColor", property_centerColor);
    attach_property_function("thirdsColor", property_thirdsColor);
</script>
</body>
</html>
